name: CI - Retrain Model

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MLProject
    steps:
      # ===== BASIC: jalankan retraining lewat MLflow Project =====
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install MLflow & dependencies
        run: pip install mlflow==2.19.0 pandas numpy scikit-learn matplotlib seaborn

      - name: Run MLflow Project (retraining)
        run: mlflow run . --env-manager=local

      - name: Read latest run ID
        run: echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_ENV

      # ===== SKILLED: simpan artefak hasil retraining ke repo (GitHub Actions artifact) =====
      - name: Upload model artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.run_number }}
          path: MLProject/mlruns/

      # ===== ADVANCE: build & push Docker image ke Docker Hub =====
      # Step ini otomatis di-skip (bukan gagal) kalau secrets DOCKERHUB_USERNAME/DOCKERHUB_TOKEN
      # belum diisi di Settings > Secrets and variables > Actions, supaya job Basic/Skilled
      # tetap berstatus SUCCESS walau Docker Hub belum disetel.
      - name: Set up Docker Buildx
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with mlflow build-docker
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n diabetes-model --enable-mlserver

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & push image
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          docker tag diabetes-model ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-model:latest
